name: Scrape Gov Data

on:
  schedule:
    - cron: '0 2 * * *'   # 每天凌晨2点(UTC)执行
    - cron: '0 12 * * *'  # 每天中午12点(UTC)执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: npx tsx scripts/scrape-cloud.ts

      - name: Run AI interpretation
        if: ${{ env.DEEPSEEK_API_KEY != '' }}
        run: npx tsx scripts/ai-interpret.ts

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/ data/
          git diff --staged --quiet || git commit -m "chore: update scraped data [skip ci]"
          git push

      - name: Trigger push notifications
        if: success()
        run: |
          echo "推送通知触发说明："
          echo "1. 小程序端：需要在微信云开发中部署 sendNotifications 云函数"
          echo "2. 部署后，在此步骤添加：npx tsx scripts/trigger-push.ts"
          echo "3. 或在微信云开发中设置定时触发器，每天自动调用 sendNotifications"
          echo "4. 当前数据已更新，用户下次打开小程序时会看到新政策"
