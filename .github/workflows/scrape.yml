name: Scrape & Deploy

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run cloud scraper
        run: npx tsx scripts/scrape-cloud.ts
        env:
          NODE_ENV: production

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scraped-coupons.json data/scrape-meta.json
          git diff --cached --quiet || git commit -m "chore: update scraped data [skip ci]"
          git push
