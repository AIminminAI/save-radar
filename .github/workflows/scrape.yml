name: Scrape Gov Data

on:
  schedule:
    - cron: '0 2 * * *'   # 每天凌晨2点执行
    - cron: '0 12 * * *'  # 每天中午12点执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: npx tsx scripts/scrape-cloud.ts

      - name: Run AI interpretation
        if: ${{ secrets.DEEPSEEK_API_KEY != '' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/ai-interpret.ts

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/ data/
          git diff --staged --quiet || git commit -m "chore: update scraped data [skip ci]"
          git push
