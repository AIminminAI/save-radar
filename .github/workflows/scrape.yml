name: Scrape Gov Data

on:
  schedule:
    - cron: '0,30 * * * *'   # 每30分钟抓取新数据
  workflow_dispatch:
    inputs:
      full_run:
        description: '是否执行AI解读（默认仅抓取）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: npx tsx scripts/scrape-cloud.ts

      # AI解读：每天北京时间10:00(UTC 02:00)和22:00(UTC 14:00)执行
      # 手动触发时也可选择执行
      - name: Check if AI interpretation should run
        id: check_ai
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          # UTC 02:00 或 14:00 执行AI解读
          if [[ "$HOUR" == "02" && "$MINUTE" == "00" ]] || [[ "$HOUR" == "14" && "$MINUTE" == "00" ]] || [[ "${{ github.event.inputs.full_run }}" == "true" ]]; then
            echo "run_ai=true" >> $GITHUB_OUTPUT
          else
            echo "run_ai=false" >> $GITHUB_OUTPUT
          fi

      - name: Run AI interpretation
        if: ${{ env.DEEPSEEK_API_KEY != '' && steps.check_ai.outputs.run_ai == 'true' }}
        run: npx tsx scripts/ai-interpret.ts

      - name: Sync data to mini program
        run: |
          mkdir -p mini/src/static/data
          cp public/data/coupons.json mini/src/static/data/coupons.json
          if [ -f public/data/meta.json ]; then
            cp public/data/meta.json mini/src/static/data/meta.json
          fi
          echo "数据已同步到小程序目录"

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/ data/ mini/src/static/data/
          git diff --staged --quiet || git commit -m "chore: update scraped data [skip ci]"
          git push
