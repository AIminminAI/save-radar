  .poster { width: 375px; background: linear-gradient(180deg, #1A1A2E 0%, #16213E 40%, #0F3460 100%); border-radius: 24px; overflow: hidden; position: relative; }

  .qr-section { background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border-radius: 20px; padding: 24px; display: flex; align-items: center; gap: 20px; border: 1px solid rgba(255,255,255,0.08); }
  .qr-box { width: 120px; height: 120px; background: #fff; border-radius: 16px; padding: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .qr-box img { width: 100%; height: 100%; }
  .qr-text { color: rgba(255,255,255,0.7); font-size: 12px; line-height: 1.8; }
  .qr-text strong { color: #00D68F; font-size: 14px; }
  .personas { display: flex; gap: 8px; margin-bottom: 24px; }

  .persona-icon { font-size: 20px; margin-bottom: 4px; }
  .persona-name { color: rgba(255,255,255,0.7); font-size: 10px; font-weight: 600; }
  .footer { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.3); font-size: 10px; }
